name: Deploy to Rumahweb (FTP)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      include_vendor:
        description: Upload vendor/ (hanya jika composer.lock berubah)
        required: false
        default: false
        type: boolean

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: antonprafanto

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, libxml, mbstring, zip, gd, bcmath, intl
          coverage: none

      - name: Composer install (for Tailwind @source scan)
        if: inputs.include_vendor != true
        run: composer install --no-dev --no-interaction --prefer-dist --no-scripts

      - name: Composer install
        if: inputs.include_vendor == true
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Build frontend assets
        run: |
          mkdir -p storage/framework/views
          npm ci && npm run build
          shopt -s nullglob
          primary=""
          for css in public/build/assets/app-*.css; do
            case "$css" in *app-B8UEwyUe.css) continue ;; esac
            primary="$css"
            break
          done
          if [ -z "$primary" ]; then
            echo "::error::No CSS asset found after Vite build"
            ls -la public/build/assets/ || true
            exit 1
          fi
          # Keep aliases so stale cached HTML still resolves during deploy window
          for legacy in app-B8UEwyUe.css app-B3YkE1t1.css app-Cn4EkkYE.css app-C5gSL19A.css; do
            target="public/build/assets/$legacy"
            [ "$(basename "$primary")" = "$legacy" ] && continue
            cp "$primary" "$target"
            echo "CSS alias: $(basename "$primary") -> $legacy"
          done

      - name: Purge compiled Blade views via FTP (pre-deploy)
        continue-on-error: true
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_DIR: ${{ secrets.FTP_SERVER_DIR }}
          FTP_PROTOCOL: ${{ secrets.FTP_PROTOCOL }}
        run: |
          PROTO="${FTP_PROTOCOL:-ftps}"
          BASE="${PROTO}://${FTP_SERVER}${FTP_DIR}"
          VIEWS_URL="${BASE}storage/framework/views/"
          AUTH="${FTP_USERNAME}:${FTP_PASSWORD}"
          count=0
          for f in $(curl -sS --ftp-pasv --user "$AUTH" --list-only "$VIEWS_URL" 2>/dev/null); do
            case "$f" in *.php)
              curl -sS --ftp-pasv --user "$AUTH" -Q "-DELE storage/framework/views/$f" "$BASE" || true
              count=$((count + 1))
              ;;
            esac
          done
          echo "Pre-deploy: deleted $count compiled view file(s)"

      - name: Write deploy marker
        run: echo "${{ github.sha }} $(date -u +%Y-%m-%dT%H:%M:%SZ)" > public/deploy-check.txt

      - name: Validate deploy secrets
        run: |
          missing=0
          for key in FTP_SERVER FTP_USERNAME FTP_PASSWORD FTP_SERVER_DIR DEPLOY_HOOK_TOKEN; do
            if [ -z "${!key}" ]; then
              echo "::error::Secret $key is empty — cek Environment antonprafanto"
              missing=1
            else
              echo "✓ $key is set"
            fi
          done
          echo "FTP_PROTOCOL=${FTP_PROTOCOL:-ftps}"
          echo "include_vendor=${{ inputs.include_vendor }}"
          [ "$missing" -eq 0 ]
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
          DEPLOY_HOOK_TOKEN: ${{ secrets.DEPLOY_HOOK_TOKEN }}
          FTP_PROTOCOL: ${{ secrets.FTP_PROTOCOL }}
          FTP_PORT: ${{ secrets.FTP_PORT }}

      - name: Prepare FTP settings
        id: ftp
        run: |
          dir="${{ secrets.FTP_SERVER_DIR }}"
          dir="${dir//[[:space:]]/}"
          dir="${dir%/}/"
          if [ -z "$dir" ]; then
            echo "::error::FTP_SERVER_DIR is empty"
            exit 1
          fi
          echo "dir=$dir" >> "$GITHUB_OUTPUT"
          proto="${{ secrets.FTP_PROTOCOL }}"
          proto="${proto//[[:space:]]/}"
          proto="${proto:-ftps}"
          echo "protocol=$proto" >> "$GITHUB_OUTPUT"
          port="${{ secrets.FTP_PORT }}"
          port="${port//[[:space:]]/}"
          port="${port:-21}"
          echo "port=$port" >> "$GITHUB_OUTPUT"

      - name: Prepare public webroot path
        id: public
        run: |
          pub="${{ secrets.FTP_PUBLIC_DIR }}"
          pub="${pub//[[:space:]]/}"
          pub="${pub:-/public_html/}"
          pub="${pub%/}/"
          echo "dir=$pub" >> "$GITHUB_OUTPUT"
          echo "Public webroot FTP dir: $pub"

      - name: Deploy build assets via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ${{ steps.ftp.outputs.protocol }}
          port: ${{ steps.ftp.outputs.port }}
          security: loose
          local-dir: ./public/build/
          server-dir: ${{ steps.ftp.outputs.dir }}public/build/
          state-name: kindo-ftp-build-v3
          log-level: standard

      - name: Deploy build assets to public webroot via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ${{ steps.ftp.outputs.protocol }}
          port: ${{ steps.ftp.outputs.port }}
          security: loose
          local-dir: ./public/build/
          server-dir: ${{ steps.public.outputs.dir }}build/
          state-name: kindo-ftp-public-build-v1
          log-level: standard

      - name: Upload deploy marker to public webroot
        run: |
          PROTO="${{ steps.ftp.outputs.protocol }}"
          curl -sS --ftp-pasv --user "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}" \
            -T public/deploy-check.txt \
            "${PROTO}://${{ secrets.FTP_SERVER }}${{ steps.public.outputs.dir }}deploy-check.txt"

      - name: Upload brand assets to public webroot
        continue-on-error: true
        run: |
          PROTO="${{ steps.ftp.outputs.protocol }}"
          BASE="${PROTO}://${{ secrets.FTP_SERVER }}${{ steps.public.outputs.dir }}"
          AUTH="${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}"
          failed=0
          for f in logo.png favicon.ico favicon-16x16.png favicon-32x32.png apple-touch-icon.png og-default.png; do
            if [ ! -f "public/$f" ]; then
              echo "::warning::Missing public/$f — skip"
              continue
            fi
            ok=0
            for attempt in 1 2 3; do
              if curl -fsS --ftp-pasv --user "$AUTH" -T "public/$f" "$BASE$f"; then
                echo "Uploaded $f (attempt $attempt)"
                ok=1
                break
              fi
              echo "Retry $f attempt $attempt failed"
              sleep 5
            done
            if [ "$ok" -ne 1 ]; then
              echo "::warning::Failed to upload $f after 3 attempts"
              failed=$((failed + 1))
            fi
          done
          if [ "$failed" -gt 0 ]; then
            echo "::warning::$failed brand asset(s) failed — deploy continues"
          fi

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ${{ steps.ftp.outputs.protocol }}
          port: ${{ steps.ftp.outputs.port }}
          security: loose
          local-dir: ./
          server-dir: ${{ steps.ftp.outputs.dir }}
          state-name: kindo-ftp-deploy-v3
          log-level: standard
          exclude: |
            **/.git*
            **/.github/**
            **/node_modules/**
            **/vendor/**
            **/tests/**
            **/.env
            **/.env.*
            **/.editorconfig
            **/.cursor/**
            **/.vscode/**
            **/.codex/**
            **/storage/**
            **/bootstrap/cache/**
            **/*.md
            **/phpunit.xml
            **/docker-compose*
            **/database/database.sqlite
            **/public/hot
            **/public/storage
            **/public/sitemap.xml
            **/public/build/**

      - name: Deploy vendor via FTP
        if: inputs.include_vendor == true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ${{ steps.ftp.outputs.protocol }}
          port: ${{ steps.ftp.outputs.port }}
          security: loose
          local-dir: ./vendor/
          server-dir: ${{ steps.ftp.outputs.dir }}vendor/
          state-name: kindo-ftp-vendor
          log-level: standard

      - name: Purge remote Laravel cache files (FTP)
        continue-on-error: true
        env:
          FTP_PROTOCOL: ${{ secrets.FTP_PROTOCOL }}
        run: |
          PROTO="${FTP_PROTOCOL:-ftps}"
          BASE="${PROTO}://${{ secrets.FTP_SERVER }}${{ secrets.FTP_SERVER_DIR }}"
          AUTH="${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}"
          for file in bootstrap/cache/config.php bootstrap/cache/routes-v7.php bootstrap/cache/packages.php bootstrap/cache/services.php public/sitemap.xml; do
            curl -sS --ftp-pasv --user "$AUTH" -Q "-DELE ${file}" "$BASE" || true
          done
          PUB="${PROTO}://${{ secrets.FTP_SERVER }}${{ steps.public.outputs.dir }}"
          curl -sS --ftp-pasv --user "$AUTH" -Q "-DELE sitemap.xml" "$PUB" || true

      - name: Purge compiled Blade views via FTP
        continue-on-error: true
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_DIR: ${{ secrets.FTP_SERVER_DIR }}
          FTP_PROTOCOL: ${{ secrets.FTP_PROTOCOL }}
        run: |
          PROTO="${FTP_PROTOCOL:-ftps}"
          BASE="${PROTO}://${FTP_SERVER}${FTP_DIR}"
          VIEWS_URL="${BASE}storage/framework/views/"
          AUTH="${FTP_USERNAME}:${FTP_PASSWORD}"
          count=0
          for f in $(curl -sS --ftp-pasv --user "$AUTH" --list-only "$VIEWS_URL" 2>/dev/null); do
            case "$f" in *.php)
              curl -sS --ftp-pasv --user "$AUTH" -Q "-DELE storage/framework/views/$f" "$BASE" || true
              count=$((count + 1))
              ;;
            esac
          done
          echo "Deleted $count compiled view file(s)"

      - name: Run migrations via deploy hook
        id: migrate
        continue-on-error: true
        run: |
          set +e
          for attempt in 1 2 3; do
            echo "Migrate attempt $attempt..."
            body="$(mktemp)"
            code=$(curl -sS --max-time 120 -o "$body" -w "%{http_code}" \
              -H "X-Deploy-Token: ${{ secrets.DEPLOY_HOOK_TOKEN }}" \
              "https://kodingindonesia.com/deploy/migrate" || echo "000")
            echo "HTTP $code"
            sed -n '1,40p' "$body" || true
            if [ "$code" = "200" ]; then
              exit 0
            fi
            sleep $((attempt * 5))
          done
          echo "::warning::Migrate hook failed after retries — continuing deploy (no pending migration required for this change)"
          exit 1

      - name: Apply UI/UX taxonomy to contributor articles via deploy hook
        continue-on-error: true
        run: |
          curl -fsS --max-time 120 \
            -H "X-Deploy-Token: ${{ secrets.DEPLOY_HOOK_TOKEN }}" \
            "https://kodingindonesia.com/deploy/apply-ui-ux-taxonomy"

      - name: Verify UI/UX taxonomy via deploy hook
        continue-on-error: true
        run: |
          curl -fsS --max-time 60 \
            -H "X-Deploy-Token: ${{ secrets.DEPLOY_HOOK_TOKEN }}" \
            "https://kodingindonesia.com/deploy/verify-ui-ux-taxonomy"

      - name: Clear Laravel cache via deploy hook
        continue-on-error: true
        run: |
          set +e
          for attempt in 1 2 3; do
            code=$(curl -sS --max-time 60 -o /tmp/clear-cache.txt -w "%{http_code}" \
              -H "X-Deploy-Token: ${{ secrets.DEPLOY_HOOK_TOKEN }}" \
              "https://kodingindonesia.com/deploy/clear-cache" || echo "000")
            echo "clear-cache HTTP $code"
            cat /tmp/clear-cache.txt || true
            [ "$code" = "200" ] && exit 0
            sleep $((attempt * 3))
          done
          echo "::warning::clear-cache hook failed after retries"
          exit 1

      - name: Remirror article images to public_html storage
        continue-on-error: true
        run: |
          set +e
          for attempt in 1 2 3; do
            body="$(mktemp)"
            code=$(curl -sS --max-time 180 -o "$body" -w "%{http_code}" \
              -H "X-Deploy-Token: ${{ secrets.DEPLOY_HOOK_TOKEN }}" \
              "https://kodingindonesia.com/deploy/remirror-article-images" || echo "000")
            echo "remirror HTTP $code"
            sed -n '1,80p' "$body" || true
            if [ "$code" = "200" ]; then
              exit 0
            fi
            sleep $((attempt * 5))
          done
          echo "::warning::remirror-article-images failed — run manually with deploy token"
          exit 1

      - name: Publish article 1 via deploy hook (idempotent)
        continue-on-error: true
        run: |
          curl -fsS --max-time 120 \
            -H "X-Deploy-Token: ${{ secrets.DEPLOY_HOOK_TOKEN }}" \
            "https://kodingindonesia.com/deploy/publish-article-1"

      - name: Publish article 2 via deploy hook (idempotent)
        continue-on-error: true
        run: |
          curl -fsS --max-time 120 \
            -H "X-Deploy-Token: ${{ secrets.DEPLOY_HOOK_TOKEN }}" \
            "https://kodingindonesia.com/deploy/publish-article-2"

      - name: Publish article 3 via deploy hook (idempotent)
        continue-on-error: true
        run: |
          curl -fsS --max-time 120 \
            -H "X-Deploy-Token: ${{ secrets.DEPLOY_HOOK_TOKEN }}" \
            "https://kodingindonesia.com/deploy/publish-article-3"

      - name: Publish article 4 via deploy hook (idempotent)
        continue-on-error: true
        run: |
          curl -fsS --max-time 120 \
            -H "X-Deploy-Token: ${{ secrets.DEPLOY_HOOK_TOKEN }}" \
            "https://kodingindonesia.com/deploy/publish-article-4"

      - name: Publish article 5 via deploy hook (idempotent)
        continue-on-error: true
        run: |
