name: Deploy to Rumahweb (FTP)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      include_vendor:
        description: Upload vendor/ (hanya jika composer.lock berubah)
        required: false
        default: false
        type: boolean

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: antonprafanto

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, libxml, mbstring, zip, gd, bcmath, intl
          coverage: none

      - name: Composer install (for Tailwind @source scan)
        if: inputs.include_vendor != true
        run: composer install --no-dev --no-interaction --prefer-dist --no-scripts

      - name: Composer install
        if: inputs.include_vendor == true
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Build frontend assets
        run: |
          mkdir -p storage/framework/views
          npm ci && npm run build
          shopt -s nullglob
          for css in public/build/assets/app-*.css; do
            [[ "$css" == *app-B8UEwyUe.css ]] && continue
            primary="$css"
            cp "$primary" public/build/assets/app-B8UEwyUe.css
            echo "Legacy CSS alias: $(basename "$primary") -> app-B8UEwyUe.css"
            break
          done

      - name: Write deploy marker
        run: echo "${{ github.sha }} $(date -u +%Y-%m-%dT%H:%M:%SZ)" > public/deploy-check.txt

      - name: Validate deploy secrets
        run: |
          missing=0
          for key in FTP_SERVER FTP_USERNAME FTP_PASSWORD FTP_SERVER_DIR DEPLOY_HOOK_TOKEN; do
            if [ -z "${!key}" ]; then
              echo "::error::Secret $key is empty — cek Environment antonprafanto"
              missing=1
            else
              echo "✓ $key is set"
            fi
          done
          echo "FTP_PROTOCOL=${FTP_PROTOCOL:-ftps}"
          echo "include_vendor=${{ inputs.include_vendor }}"
          [ "$missing" -eq 0 ]
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
          DEPLOY_HOOK_TOKEN: ${{ secrets.DEPLOY_HOOK_TOKEN }}
          FTP_PROTOCOL: ${{ secrets.FTP_PROTOCOL }}
          FTP_PORT: ${{ secrets.FTP_PORT }}

      - name: Prepare FTP settings
        id: ftp
        run: |
          dir="${{ secrets.FTP_SERVER_DIR }}"
          dir="${dir//[[:space:]]/}"
          dir="${dir%/}/"
          if [ -z "$dir" ]; then
            echo "::error::FTP_SERVER_DIR is empty"
            exit 1
          fi
          echo "dir=$dir" >> "$GITHUB_OUTPUT"
          proto="${{ secrets.FTP_PROTOCOL }}"
          proto="${proto//[[:space:]]/}"
          proto="${proto:-ftps}"
          echo "protocol=$proto" >> "$GITHUB_OUTPUT"
          port="${{ secrets.FTP_PORT }}"
          port="${port//[[:space:]]/}"
          port="${port:-21}"
          echo "port=$port" >> "$GITHUB_OUTPUT"

      - name: Deploy build assets via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ${{ steps.ftp.outputs.protocol }}
          port: ${{ steps.ftp.outputs.port }}
          security: loose
          local-dir: ./public/build/
          server-dir: ${{ steps.ftp.outputs.dir }}public/build/
          state-name: kindo-ftp-build-v3
          dangerous-clean-slate: true
          log-level: standard

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ${{ steps.ftp.outputs.protocol }}
          port: ${{ steps.ftp.outputs.port }}
          security: loose
          local-dir: ./
          server-dir: ${{ steps.ftp.outputs.dir }}
          state-name: kindo-ftp-deploy-v3
          log-level: standard
          exclude: |
            **/.git*
            **/.github/**
            **/node_modules/**
            **/vendor/**
            **/tests/**
            **/.env
            **/.env.*
            **/.editorconfig
            **/.cursor/**
            **/.vscode/**
            **/.codex/**
            **/storage/**
            **/bootstrap/cache/**
            **/*.md
            **/phpunit.xml
            **/docker-compose*
            **/database/database.sqlite
            **/public/hot
            **/public/storage
            **/public/build/**

      - name: Deploy vendor via FTP
        if: inputs.include_vendor == true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ${{ steps.ftp.outputs.protocol }}
          port: ${{ steps.ftp.outputs.port }}
          security: loose
          local-dir: ./vendor/
          server-dir: ${{ steps.ftp.outputs.dir }}vendor/
          state-name: kindo-ftp-vendor
          log-level: standard

      - name: Purge remote Laravel cache files (FTP)
        continue-on-error: true
        run: |
          BASE="ftp://${{ secrets.FTP_SERVER }}${{ secrets.FTP_SERVER_DIR }}"
          AUTH="${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}"
          for file in bootstrap/cache/config.php bootstrap/cache/routes-v7.php bootstrap/cache/packages.php bootstrap/cache/services.php; do
            curl -sS --ftp-pasv --user "$AUTH" -Q "-DELE ${file}" "$BASE" || true
          done

      - name: Purge compiled Blade views via FTP
        continue-on-error: true
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          python3 << 'PYEOF'
          import ftplib
          import os
          import ssl

          host = os.environ["FTP_SERVER"]
          user = os.environ["FTP_USERNAME"]
          password = os.environ["FTP_PASSWORD"]
          base = os.environ["FTP_DIR"].strip().strip("/")
          views = f"{base}/storage/framework/views"

          ftp = ftplib.FTP_TLS(context=ssl.create_default_context())
          ftp.connect(host, 21, timeout=60)
          ftp.login(user, password)
          ftp.prot_p()
          ftp.cwd(views)
          deleted = 0
          for name in ftp.nlst():
              if name.endswith(".php"):
                  try:
                      ftp.delete(name)
                      deleted += 1
                  except ftplib.error_perm:
                      pass
          ftp.quit()
          print(f"Deleted {deleted} compiled view file(s)")
          PYEOF

      - name: Clear Laravel cache via deploy hook
        continue-on-error: true
        run: |
          curl -fsS --max-time 60 \
            "https://kodingindonesia.com/deploy/clear-cache?token=${{ secrets.DEPLOY_HOOK_TOKEN }}"
