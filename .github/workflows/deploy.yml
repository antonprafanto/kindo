name: Deploy to Rumahweb (FTP)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      include_vendor:
        description: Upload vendor/ (hanya jika composer.lock berubah)
        required: false
        default: false
        type: boolean

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: antonprafanto

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        if: inputs.include_vendor == true
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, libxml, mbstring, zip, gd, bcmath, intl
          coverage: none

      - name: Composer install
        if: inputs.include_vendor == true
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Build frontend assets
        run: npm ci && npm run build

      - name: Validate deploy secrets
        run: |
          missing=0
          for key in FTP_SERVER FTP_USERNAME FTP_PASSWORD FTP_SERVER_DIR DEPLOY_HOOK_TOKEN; do
            if [ -z "${!key}" ]; then
              echo "::error::Secret $key is empty — cek Environment antonprafanto"
              missing=1
            else
              echo "✓ $key is set"
            fi
          done
          echo "FTP_PROTOCOL=${FTP_PROTOCOL:-ftps}"
          echo "include_vendor=${{ inputs.include_vendor }}"
          [ "$missing" -eq 0 ]
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
          DEPLOY_HOOK_TOKEN: ${{ secrets.DEPLOY_HOOK_TOKEN }}
          FTP_PROTOCOL: ${{ secrets.FTP_PROTOCOL }}
          FTP_PORT: ${{ secrets.FTP_PORT }}

      - name: Prepare FTP settings
        id: ftp
        run: |
          dir="${{ secrets.FTP_SERVER_DIR }}"
          dir="${dir//[[:space:]]/}"
          dir="${dir%/}/"
          if [ -z "$dir" ]; then
            echo "::error::FTP_SERVER_DIR is empty"
            exit 1
          fi
          echo "dir=$dir" >> "$GITHUB_OUTPUT"
          proto="${{ secrets.FTP_PROTOCOL }}"
          proto="${proto//[[:space:]]/}"
          proto="${proto:-ftps}"
          echo "protocol=$proto" >> "$GITHUB_OUTPUT"
          port="${{ secrets.FTP_PORT }}"
          port="${port//[[:space:]]/}"
          port="${port:-21}"
          echo "port=$port" >> "$GITHUB_OUTPUT"

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ${{ steps.ftp.outputs.protocol }}
          port: ${{ steps.ftp.outputs.port }}
          security: loose
          local-dir: ./
          server-dir: ${{ steps.ftp.outputs.dir }}
          state-name: kindo-ftp-deploy
          log-level: standard
          exclude: |
            **/.git*
            **/.github/**
            **/node_modules/**
            **/vendor/**
            **/tests/**
            **/.env
            **/.env.*
            **/.editorconfig
            **/.cursor/**
            **/.vscode/**
            **/.codex/**
            **/storage/**
            **/bootstrap/cache/**
            **/*.md
            **/phpunit.xml
            **/docker-compose*
            **/database/database.sqlite
            **/public/hot
            **/public/storage

      - name: Deploy vendor via FTP
        if: inputs.include_vendor == true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ${{ steps.ftp.outputs.protocol }}
          port: ${{ steps.ftp.outputs.port }}
          security: loose
          local-dir: ./vendor/
          server-dir: ${{ steps.ftp.outputs.dir }}vendor/
          state-name: kindo-ftp-vendor
          log-level: standard

      - name: Purge remote Laravel cache files (FTP)
        continue-on-error: true
        run: |
          BASE="ftp://${{ secrets.FTP_SERVER }}${{ secrets.FTP_SERVER_DIR }}"
          AUTH="${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}"
          for file in bootstrap/cache/config.php bootstrap/cache/routes-v7.php bootstrap/cache/packages.php bootstrap/cache/services.php; do
            curl -sS --ftp-pasv --user "$AUTH" -Q "-DELE ${file}" "$BASE" || true
          done

      - name: Clear Laravel cache via deploy hook
        continue-on-error: true
        run: |
          curl -fsS --max-time 60 \
            "https://kodingindonesia.com/deploy/clear-cache?token=${{ secrets.DEPLOY_HOOK_TOKEN }}"
